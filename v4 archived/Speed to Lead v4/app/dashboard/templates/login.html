<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Speed to Lead</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-surface: #12121a;
            --bg-elevated: #1a1a25;
            --border: rgba(255, 255, 255, 0.06);
            --text-primary: #e8e8ed;
            --text-secondary: #6b7280;
            --text-muted: #4b5563;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --error: #ef4444;
            --radius-sm: 6px;
            --radius-lg: 12px;
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 380px;
        }
        
        .login-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
        }
        
        .login-logo h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        
        .login-logo p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow-lg);
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        
        .input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        .input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .input::placeholder {
            color: var(--text-muted);
        }
        
        .btn-signin {
            width: 100%;
            padding: 10px 16px;
            background: var(--accent);
            color: white;
            border: 1px solid var(--accent);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }
        
        .btn-signin:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            font-size: 13px;
            color: var(--error);
            margin-bottom: 16px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <div class="logo-icon">S</div>
            <h1>Speed to Lead</h1>
            <p>Sign in to your account</p>
        </div>
        
        <div class="login-card">
            <div class="error-message {% if error %}show{% endif %}" id="error-message">
                {% if error %}{{ error }}{% else %}Invalid credentials. Please try again.{% endif %}
            </div>
            
            <form method="POST" action="/dashboard/login">
                <div class="form-group">
                    <label class="form-label" for="dealer_slug">Dealer ID</label>
                    <input type="text" id="dealer_slug" name="dealer_slug" class="input" placeholder="your-dealer-slug" required autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="input" placeholder="admin" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="input" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-signin">Sign In</button>
            </form>
        </div>
        
        <div class="login-footer">
            Speed to Lead v4 &middot; Built for Canadian dealerships
        </div>
    </div>
</body>
</html>
