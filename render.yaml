services:
  - type: web
    name: speed-to-lead-v5
    runtime: python
    plan: hobby
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: OUTBOUND_ENABLED
        value: "true"
      - key: PUBLIC_BASE_URL
        value: "https://speed-to-lead-v5.onrender.com"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.3"
    healthCheckPath: /healthz
