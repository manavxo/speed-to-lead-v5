# NOTE: the LIVE database is speed-to-leadv5-db (correct schema + data), wired
# via the manually-set DATABASE_URL in the web service below. The entry here is
# the original DB — now suspended with an outdated schema — kept for reference.
databases:
  - name: speed-to-lead-db
    plan: free
    databaseName: speedtolead
    user: speedtolead

services:
  - type: web
    name: speed-to-lead-v5
    runtime: python
    plan: hobby
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Live database is set manually in the Render dashboard to the
      # speed-to-leadv5-db INTERNAL connection string. Kept as sync:false so a
      # blueprint sync never reverts it to the old (outdated-schema) DB.
      - key: DATABASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: OUTBOUND_ENABLED
        value: "true"
      - key: PUBLIC_BASE_URL
        value: "https://speed-to-lead-v5.onrender.com"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: QUIET_HOURS_DISABLED
        value: "false"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.3"
    healthCheckPath: /healthz
